name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-gcc:
    name: GCC toolchain build
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 1G

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo ./scripts/install-apt-dependencies
          sudo apt install -y ccache

      - name: Prepare ccache directory
        run: |
          echo $CCACHE_DIR
          mkdir -p "$CCACHE_DIR"

      - name: Setup ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-build-gcc-${{ github.run_id }}
          restore-keys: |
            ccache-build-gcc-

      - name: Enable ccache
        run: echo "/usr/lib/ccache" >> "$GITHUB_PATH"

      - name: Build Linux
        run: |
          mkdir build-linux
          cd build-linux
          ../configure --disable-debug --prefix /opt/gcc/linux
          make -j$(nproc) stamps/build-gcc-stage2

      - name: Build Win32
        run: |
          cd build-linux/build-newlib
          make install prefix=/opt/gcc/win32
          cd ../..
          mkdir build-win32
          cd build-win32
          ../configure --disable-debug --prefix /opt/gcc/win32 --with-host=x86_64-w64-mingw32
          make -j$(nproc) stamps/build-binutils-tc
          export PATH="/opt/gcc/linux/bin:$PATH"
          make -j$(nproc) stamps/build-gcc-stage2-only

      - name: Package
        run: |
          cp tricore-gcc/gcc/BASE-VER /opt/gcc/
          cd /opt/gcc/linux
          rm -rf deps
          tar -czf ../gcc-linux.tar.gz .
          cd /opt/gcc/win32
          rm -rf deps
          zip -r9 ../gcc-win32.zip .
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: tricore-gcc-artifacts
          path: |
            /opt/gcc/*.zip
            /opt/gcc/*.tar.gz
            /opt/gcc/BASE-VER
  
  build-qemu-linux:
    name: QEMU linux build
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 1G

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
