      - name: Setup ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-build-qemu-linux-${{ github.run_id }}
          restore-keys: |
            ccache-build-qemu-linux-

      - name: Enable ccache
